<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asesor Inmobiliario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    .agent-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .agent-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 15px;
      border: 3px solid black;
    }

    .agent-name {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }

    .agent-company {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .agent-presentation {
      color: #555;
      font-size: 13px;
      line-height: 1.5;
      margin: 12px 0;
      font-style: italic;
    }

    .agent-contact {
      font-size: 12px;
      color: #999;
      margin: 10px 0;
    }

    .vcard-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn-vcard, .btn-whatsapp-agent {
      padding: 8px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-vcard {
      background: black;
      color: white;
    }

    .btn-vcard:hover {
      background: #333;
    }

    .btn-whatsapp-agent {
      background: #25d366;
      color: white;
    }

    .btn-whatsapp-agent:hover {
      background: #20ba5a;
    }

    .propiedades-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .property-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .property-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .property-image {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #f0f0f0;
    }

    .property-info {
      padding: 12px;
    }

    .property-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }

    .property-price {
      color: #e74c3c;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .property-details {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }

    .btn-consultar {
      width: 100%;
      padding: 8px;
      background: black;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-consultar:hover {
      background: #333;
    }

    .admin-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.3s;
      z-index: 999;
    }

    .admin-link:hover {
      background: black;
      transform: scale(1.1);
    }

    .no-properties {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 14px;
    }

    .admin-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: black;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 998;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Tu próxima propiedad empieza acá</h1>
  <p>Escaneaste mi tarjeta inteligente</p>

  <div id="nfcLogin" style="display:none; margin: 15px 0; padding: 12px; border: 1px dashed #ccc; border-radius: 8px; background: #fafafa;">
    <h3>Acceso NFC</h3>
    <div style="margin-bottom: 8px;"><label>Usuario NFC</label><br><input id="nfcLoginUsername" type="text" style="width:100%"></div>
    <div style="margin-bottom: 8px;"><label>Contraseña NFC</label><br><input id="nfcLoginPassword" type="password" style="width:100%"></div>
    <button id="nfcLoginBtn" style="padding: 8px 12px;">Ingresar</button>
    <div id="nfcLoginMessage" style="margin-top: 8px; color: red;"></div>
  </div>

  <!-- VCARD DEL AGENTE -->
  <div class="agent-card" id="agentCard">
    <div id="agentContent"></div>
  </div>

  <!-- FORMULARIO -->
  <form id="leadForm">
    <input type="text" name="nombre" placeholder="Tu nombre" required>
    <input type="tel" name="telefono" placeholder="Tu WhatsApp" required>

    <select name="interes">
      <option value="comprar">Comprar</option>
      <option value="alquilar">Alquilar</option>
      <option value="vender">Vender</option>
    </select>

    <button type="submit">Ver propiedades</button>
  </form>

  <!-- BOTONES DIRECTOS -->
  <div class="botones">
    <a id="btnComprar" href="#">Comprar</a>
    <a id="btnAlquilar" href="#">Alquilar</a>
    <a id="btnVender" href="#">Vender</a>
  </div>

  <!-- CATÁLOGO DE PROPIEDADES -->
  <div id="catalogo">
    <h2>Propiedades en Cartera</h2>
    <div id="lista" class="propiedades-grid"></div>
  </div>
</div>

<!-- Botón de Admin -->
<a href="login.html" class="admin-link" title="Panel de Admin">⚙️</a>

<script src="utils.js"></script>
<script>
// Cargar datos según NFC
async function loadNFCData() {
  const params = new URLSearchParams(window.location.search);
  const nfcId = params.get('nfc_id');
  const nfcToken = params.get('nfc_token');

  if (!nfcId) return;

  const nfcLogin = document.getElementById('nfcLogin');
  const nfcLoginMessage = document.getElementById('nfcLoginMessage');

  async function loadFromAPI(token) {
    try {
      const response = await fetch(`/api/auth?action=get-nfc-data&nfc_id=${encodeURIComponent(nfcId)}&nfc_token=${encodeURIComponent(token)}`);
      const data = await response.json();

      if (!data.success) {
        nfcLoginMessage.textContent = data.error || 'Error cargando NFC';
        nfcLogin.style.display = 'block';
        return;
      }

      window.nfcData = data;
      window.numero = data.nfc.numero_whatsapp;
      if (typeof numero !== 'undefined') {
        numero = data.nfc.numero_whatsapp;
      }

      nfcLogin.style.display = 'none';
      if (typeof renderAgentCard === 'function') await renderAgentCard();
      if (typeof renderProperties === 'function') await renderProperties();
    } catch (error) {
      nfcLoginMessage.textContent = 'Error conectando con el servidor';
      nfcLogin.style.display = 'block';
      console.warn('Error cargando NFC:', error);
    }
  }

  if (nfcToken) {
    await loadFromAPI(nfcToken);
    return;
  }

  // Si no hay token en la URL, mostrar login NFC
  nfcLogin.style.display = 'block';
  nfcLoginMessage.textContent = '';

  document.getElementById('nfcLoginBtn').onclick = async () => {
    const username = document.getElementById('nfcLoginUsername').value.trim();
    const password = document.getElementById('nfcLoginPassword').value.trim();

    if (!username || !password) {
      nfcLoginMessage.textContent = 'Completa usuario y contraseña';
      return;
    }

    try {
      const response = await fetch('/api/auth?action=login-nfc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nfc_id: nfcId, nfc_username: username, nfc_password: password })
      });

      const data = await response.json();
      if (!data.success) {
        nfcLoginMessage.textContent = data.error || 'Credenciales inválidas';
        return;
      }

      await loadFromAPI(data.nfc_token);
    } catch (error) {
      nfcLoginMessage.textContent = 'Error de conexión';
      console.warn('Error login NFC:', error);
    }
  };
}

// Cargar NFC data y renderizar después del DOMContentLoaded
window.addEventListener('DOMContentLoaded', async () => {
  await loadNFCData();
  if (!window.nfcData) {
    // sin NFC, cargar datos por default
    if (typeof renderAgentCard === 'function') await renderAgentCard();
    if (typeof renderProperties === 'function') await renderProperties();
  }
});
</script>

</body>
</html>
